name: Generate CV PDF

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cv/index.html'

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Build Jekyll site
      uses: actions/jekyll-build-pages@v1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Puppeteer
      run: npm install puppeteer

    - name: Serve site and print PDF
      run: |
        python3 -m http.server 8000 --directory _site &
        sleep 2
        node -e "
        const puppeteer = require('puppeteer');
        (async () => {
          const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
          const page = await browser.newPage();
          await page.goto('http://localhost:8000/cv/', { waitUntil: 'networkidle0' });
          await page.pdf({
            path: 'cv/sturlabragason_cv.pdf',
            format: 'A4',
            displayHeaderFooter: false,
            printBackground: true,
            margin: { top: '8mm', bottom: '8mm', left: '12mm', right: '12mm' }
          });
          await browser.close();
        })();
        "
        kill %1

    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add cv/sturlabragason_cv.pdf
        git diff --quiet --staged || git commit -m 'Update CV PDF'
        git push
