<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  {%- include head.html -%}
  <body>
    {%- include header.html -%}
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>
    <style>
      @media print {
        .site-nav, .no-print { display: none !important; }
        .site-header { padding: 0; margin: 0; min-height: 0; }
        .page-content { padding: 0; }
        .wrapper { max-width: 100%; padding: 0; }
        h1, h2 { margin-top: 0.5em; margin-bottom: 0.3em; }
        hr { margin: 0.5em 0; }
        blockquote { margin: 0.3em 0; }
        p { margin: 0.3em 0; }
      }
    </style>
  </body>
</html>
